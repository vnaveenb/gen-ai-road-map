version: "3.9"

services:
  genai-roadmap-web:
    image: ${GHCR_IMAGE:-ghcr.io/your-github-username/genai-roadmap-web}:${IMAGE_TAG:-latest}
    container_name: genai-roadmap-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8088}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# If you run cloudflared as another service in the same stack/network,
# route traffic to http://genai-roadmap-web:80 and you can remove the ports mapping.
