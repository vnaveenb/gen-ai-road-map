server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Avoid absolute redirects behind reverse proxies (Cloudflare Tunnel).
    absolute_redirect off;

    # Serve pre-rendered Astro pages and static assets.
    # Resolve directory-format builds ($uri/index.html) without a 301 redirect.
    location / {
        try_files $uri $uri/index.html =404;
    }

    location ~* \.(css|js|mjs|json|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
