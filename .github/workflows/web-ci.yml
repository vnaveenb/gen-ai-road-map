name: web-ci

on:
  pull_request:
    paths:
      - "web/**"
      - "library/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "library/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Interview coverage gate
        working-directory: .
        run: node library/_tools/interview-coverage-check.mjs --enforce-baseline

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
