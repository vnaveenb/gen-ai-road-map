name: web-docker-publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${owner_lc}/genai-roadmap-web" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: pkg
        shell: bash
        run: echo "version=$(jq -r .version web/package.json)" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=genai-roadmap-web
            org.opencontainers.image.version=${{ steps.pkg.outputs.version }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published image
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "Published tags:"
          echo "${{ steps.meta.outputs.tags }}"
          {
            echo "### Published Docker image"
            echo
            echo "Tags pushed to GHCR:"
            echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' | sed '/^$/d' | sed 's/^/- /'
            echo
            echo "If this is a user-owned repo, check:"
            echo "https://github.com/users/${owner_lc}/packages/container/genai-roadmap-web"
            echo
            echo "If this is an org-owned repo, check:"
            echo "https://github.com/orgs/${owner_lc}/packages/container/genai-roadmap-web"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger Portainer redeploy webhook
        if: ${{ env.PORTAINER_WEBHOOK_URL != '' }}
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          curl -fsSL -X POST "$PORTAINER_WEBHOOK_URL"
